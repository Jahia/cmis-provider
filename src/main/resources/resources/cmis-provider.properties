cmisFactory.type.tooltip=By choosing 'CMIS server' the admin credentials will be used to read the CMIS repository, this option correspond to the standard CMIS connector support that should work with multiple server types. \
  But if you choose 'Alfresco server' user impersonation is done and users should only see documents and folders they have the right to see in Alfresco repository. Alfresco server version supported are 4.2 and 5.0. \
  The alfresco server needs the alfresco-auth-amp plugin in order to perform this user impersonation. If you do not want user impersonation for an Alfresco server you can use the standard 'CMIS server' option
