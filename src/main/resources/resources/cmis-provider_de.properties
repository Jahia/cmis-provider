cmisFactory.type.tooltip=F\u00FCr die 'Standard CMIS Verbindung' werden die Admin-Zugangsdaten verwendet, um das CMIS-Repository zu lesen. Diese Option entspricht der Unterst\u00FCtzung der Standard CMIS Verbindung, die mit multiplen Servertypen funktionieren sollte. \
  Wird die 'Alfresco personifizierte Verbindung' gew\u00E4hlt, wird eine Benutzer-Authentifizierung durchgef\u00FChrt, und die Benutzer sollten nur die Daten sehen, f\u00FCr die sie die Rechte im Alfresco Repository besitzen. Unterst\u00FCtzte Alfresco Server Versionen sind 4.2 and 5.0. \
  Der Alfresco Server ben\u00F6tigt das alfresco-auth-amp Plugin, um die Personifizierung durchzuf\u00FChren. Sollte die Personifizierung nicht gew\u00FCnscht sein, w\u00E4hlen Sie bitte die 'Standard CMIS server' Option.
