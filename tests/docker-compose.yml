version: '3.6'
services:
    mariadb:
        image: library/mariadb:10-focal
        container_name: mariadb
        deploy:
            resources:
                limits:
                    memory: 1gb
        networks:
            - stack
        command: --max_allowed_packet=1073741824 --transaction-isolation=READ-UNCOMMITTED --innodb-lock-wait-timeout=10
        environment:
            MYSQL_ROOT_PASSWORD: root1234
            MYSQL_DATABASE: jahia
            MYSQL_USER: jahia
            MYSQL_PASSWORD: jahia
            TZ: ${TIMEZONE}

    jahia:
        image: '${JAHIA_IMAGE}'
        container_name: jahia
        restart: 'no'
        deploy:
            resources:
                limits:
                    memory: 4gb
        depends_on:
            - mariadb
        networks:
            - stack
        ports:
            - "8080:8080"
            - "8101:8101"
            - "8000:8000"
        extra_hosts:
            - jahia:127.0.0.1
        environment:
            jahia_cfg_karaf_remoteShellHost: 0.0.0.0
            DB_VENDOR: mariadb
            DB_HOST: mariadb
            DB_NAME: jahia
            DB_USER: jahia
            DB_PASS: jahia
            JAHIA_LICENSE: ${JAHIA_LICENSE}
            SUPER_USER_PASSWORD: ${JAHIA_PASSWORD}
            CLUSTER_ENABLED: '${JAHIA_CLUSTER_ENABLED}'
            PROCESSING_SERVER: 'true'
            MAX_RAM_PERCENTAGE: 95
            JAHIA_PROPERTIES: ${JAHIA_PROPERTIES}
            CATALINA_OPTS: ${CATALINA_OPTS}
            RESTORE_MODULE_STATES: 'false'
            NEXUS_USERNAME: ${NEXUS_USERNAME}
            NEXUS_PASSWORD: ${NEXUS_PASSWORD}
            TZ: ${TIMEZONE}
            JPDA: 'true'

    jahia-browsing-a:
        image: '${JAHIA_IMAGE}'
        container_name: jahia-browsing-a
        restart: 'no'
        deploy:
            resources:
                limits:
                    memory: 4gb
        depends_on:
            - mariadb
        networks:
            - stack
        ports:
            - '8881:8080'
            - '8102:8101'
        environment:
            jahia_cfg_karaf_remoteShellHost: 0.0.0.0
            DB_VENDOR: mariadb
            DB_HOST: mariadb
            DB_NAME: jahia
            DB_USER: jahia
            DB_PASS: jahia
            JAHIA_LICENSE: ${JAHIA_LICENSE}
            SUPER_USER_PASSWORD: ${JAHIA_PASSWORD}
            CLUSTER_ENABLED: '${JAHIA_CLUSTER_ENABLED}'
            PROCESSING_SERVER: 'false'
            PROCESSING_HOST: jahia
            MAX_RAM_PERCENTAGE: 95
            JAHIA_PROPERTIES: ${JAHIA_PROPERTIES}
            CATALINA_OPTS: ${CATALINA_OPTS}
            RESTORE_MODULE_STATES: 'false'
            NEXUS_USERNAME: ${NEXUS_USERNAME}
            NEXUS_PASSWORD: ${NEXUS_PASSWORD}
            TZ: ${TIMEZONE}

    jahia-browsing-b:
        image: '${JAHIA_IMAGE}'
        container_name: jahia-browsing-b
        restart: 'no'
        deploy:
            resources:
                limits:
                    memory: 4gb
        depends_on:
            - mariadb
        networks:
            - stack
        ports:
            - '8882:8080'
            - '8103:8101'
        environment:
            jahia_cfg_karaf_remoteShellHost: 0.0.0.0
            DB_VENDOR: mariadb
            DB_HOST: mariadb
            DB_NAME: jahia
            DB_USER: jahia
            DB_PASS: jahia
            JAHIA_LICENSE: ${JAHIA_LICENSE}
            SUPER_USER_PASSWORD: ${JAHIA_PASSWORD}
            CLUSTER_ENABLED: '${JAHIA_CLUSTER_ENABLED}'
            PROCESSING_SERVER: 'false'
            PROCESSING_HOST: jahia
            MAX_RAM_PERCENTAGE: 95
            JAHIA_PROPERTIES: ${JAHIA_PROPERTIES}
            CATALINA_OPTS: ${CATALINA_OPTS}
            RESTORE_MODULE_STATES: 'false'
            TZ: ${TIMEZONE}
            NEXUS_USERNAME: ${NEXUS_USERNAME}
            NEXUS_PASSWORD: ${NEXUS_PASSWORD}

    dockerldap:
        image: "jahia/docker-openldap:${LDAP_TAG}"
        container_name: dockerldap
        environment:
            LDAP_LOG_LEVEL: "256"
            LDAP_ORGANISATION: "Jahia Inc."
            LDAP_DOMAIN: "jahia.com"
            LDAP_BASE_DN: "cn=admin,dc=jahia,dc=com"
            LDAP_ADMIN_PASSWORD: "admin"
            LDAP_CONFIG_PASSWORD: "config"
            LDAP_READONLY_USER: "false"
        tty: true
        stdin_open: true
        volumes:
            - /var/lib/ldap
            - /etc/ldap/slapd.d
            - /container/service/slapd/assets/certs/
        ports:
            - "389:389"
            - "636:636"
        domainname: "jahia.com"
        hostname: "ldap-server"
        networks:
            - stack

    # This is alfresco community docker adapted to be used with docker-compose 3.6, ldap and stack network
    alfresco:
        image: docker-alfresco
        container_name: alfresco
        environment:
            INITIAL_PASS: admin
        ports:
            - "9080:8080"
        networks:
            - stack

    # Cypress container
    cypress:
      image: '${TESTS_IMAGE}'
      # https://github.com/cypress-io/cypress/issues/350
      ipc: host
      container_name: cypress
      deploy:
        resources:
          limits:
            memory: 4gb
      depends_on:
        - jahia
      environment:
        # Uses variable substitution: https://docs.docker.com/compose/compose-file/compose-file-v3/#variable-substitution
        MANIFEST: ${MANIFEST:-provisioning-manifest-build.yml}
        JAHIA_USERNAME: ${JAHIA_USERNAME}
        JAHIA_PASSWORD: ${JAHIA_PASSWORD}
        JAHIA_URL: "http://jahia:8080"
        JAHIA_HOST: "jahia"
        JAHIA_PORT: "8080"
        ALFRESCO_URL: "http://alfresco:8080"
        NEXUS_USERNAME: ${NEXUS_USERNAME}
        NEXUS_PASSWORD: ${NEXUS_PASSWORD}
        SUPER_USER_PASSWORD: ${SUPER_USER_PASSWORD}
        JAHIA_CLUSTER_ENABLED: '${JAHIA_CLUSTER_ENABLED}'
        TZ: ${TIMEZONE}
      networks:
        - stack
networks:
    stack:

volumes:
  shared-file-store-volume:
    driver_opts:
      type: tmpfs
      device: tmpfs