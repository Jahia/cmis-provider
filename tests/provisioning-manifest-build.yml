- karafCommand: "bundle:list"

- installBundle:
    - 'mvn:org.jahia.modules/press/3.1.0'
    - 'mvn:org.jahia.modules/person/3.2.0'
    - 'mvn:org.jahia.modules/news/3.4.0'
    - 'mvn:org.jahia.modules/font-awesome/6.1.5'
    - 'mvn:org.jahia.modules/calendar/3.2.0'
    - 'mvn:org.jahia.modules/bootstrap3-core/4.2.0'
    - 'mvn:org.jahia.modules/bootstrap3-components/4.2.0'
    - 'mvn:org.jahia.modules/location/3.2.0'
    - 'mvn:org.jahia.modules/topstories/3.0.0'
    - 'mvn:org.jahia.modules/rating/3.2.0'
    - 'mvn:org.jahia.modules/event/3.1.0'
    - 'mvn:org.jahia.modules/bookmarks/3.1.0'
    - 'mvn:org.jahia.modules/dx-base-demo-core/2.3.0'
    - 'mvn:org.jahia.modules/dx-base-demo-templates/3.1.0'
    - 'mvn:org.jahia.modules/dx-base-demo-components/2.2.0'
    - 'mvn:org.jahia.modules/digitall/2.3.0'
    - 'mvn:org.jahia.modules/ldap/4.5.0'
  autoStart: true
  uninstallPreviousVersion: true

- import: "jar:mvn:org.jahia.modules/digitall/2.3.0/zip/import!/users.zip"
- importSite: "jar:mvn:org.jahia.modules/digitall/2.3.0/zip/import!/Digitall.zip"

- addMavenRepository: 'https://devtools.jahia.com/nexus/content/groups/public/@snapshots@noreleases'
- addMavenRepository: 'https://devtools.jahia.com/nexus/content/groups/internal@id=jahia-internal@snapshots'
  username: ${env:NEXUS_USERNAME}
  password: ${env:NEXUS_PASSWORD}
- installBundle:
  - 'mvn:org.jahia.modules/jcontent'
  - url: 'mvn:org.jahia.modules/qa-module'
  autoStart: true
  uninstallPreviousVersion: true

- enable: "qa-module"
  site: "digitall"

- editConfiguration: "org.jahia.services.usermanager.ldap-config-rqa5"
  properties:
    url: "ldap://dockerldap/"
    group.search.name: "ou=Groups,dc=jahia,dc=com"
    user.uid.search.name: "ou=people,dc=jahia,dc=com"
    public.bind.dn: "cn=admin,dc=jahia,dc=com"
    public.bind.password: "admin"
